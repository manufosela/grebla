# Bloquea PRs con atribución a IA en el título, el cuerpo o los mensajes de
# commit. Complementa al hook local de commit-msg (~/.git-hooks), que no puede
# cubrir los cuerpos de PR (se crean vía la API de GitHub, fuera de git).
#
# Patrones DELIBERADAMENTE específicos (firmas de atribución), para no dar
# falsos positivos con contenido legítimo del producto que hable de IA.
name: No AI attribution

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Comprobar título, cuerpo y commits de la PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Firmas de atribución a IA (no palabras sueltas como "IA"):
          PATTERN='([Gg]enerated with.*[Cc]laude|[Gg]enerated with \[|claude\.ai/|claude\.com/|noreply@anthropic\.com|[Aa]nthropic|Claude (Code|Opus|Sonnet|Haiku|Fable)|[Cc]o-[Aa]uthored-[Bb]y:.*([Cc]laude|[Cc]opilot|ChatGPT|[Gg]emini|[Bb]ot)|🤖 [Gg]enerated|[Cc]reated with ChatGPT|[Ww]ritten by (an )?AI)'

          fail=0

          check() {
            local label="$1"; local content="$2"
            if matches=$(printf '%s\n' "$content" | grep -nE "$PATTERN" || true); [ -n "$matches" ]; then
              echo "::error::Atribución a IA detectada en $label:"
              printf '%s\n' "$matches"
              fail=1
            fi
          }

          check "el TÍTULO de la PR" "$PR_TITLE"
          check "el CUERPO de la PR" "$PR_BODY"

          # Mensajes de commit de la PR (los hooks locales no aplican a commits
          # hechos desde la web o desde otras máquinas sin el hook).
          commits=$(gh api "repos/$REPO/pulls/$PR_NUMBER/commits" --paginate --jq '.[].commit.message')
          check "los MENSAJES DE COMMIT de la PR" "$commits"

          if [ "$fail" -eq 1 ]; then
            echo "::error::Política del repositorio: ninguna referencia de atribución a IA en PRs ni commits. Edita la PR/commits y reintenta. ($PR_URL)"
            exit 1
          fi
          echo "✓ Sin atribuciones a IA en título, cuerpo ni commits."
