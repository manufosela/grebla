# Este workflow lo generaba `kj harden` (marcadores kj:managed), pero su plantilla
# instala con `npm ci` y este proyecto usa pnpm: sin package-lock.json esa
# instalación fallaba SIEMPRE, así que el check salía en rojo en todas las PR y
# acabó ignorándose — se mergeaba con --admin (RMR-TSK-0298). Un check que
# siempre falla es lo mismo que no tener check.
#
# Se saca a propósito de la gestión de kj (sin los marcadores kj:managed) para
# que un `kj harden` posterior no vuelva a pisarlo con npm. Reportado en
# karajan-code para que la plantilla detecte el gestor de paquetes del repo.
name: Quality
on:
  pull_request:
    branches: [main]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Sin `version`: la toma de packageManager en package.json, así CI y local
      # usan exactamente el mismo pnpm.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Sin paso de lint: este proyecto no tiene script `lint`. La plantilla de kj
      # lo arrastraba con `--if-present`, pero pnpm espera las flags ANTES del
      # nombre del script, así que ese paso fallaba en vez de saltarse. La calidad
      # la dan el chequeo de tipos y los tests; si algún día hay linter, se añade.
      - run: pnpm run check
      - run: pnpm test
