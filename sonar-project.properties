sonar.projectKey=grebla-app
sonar.projectName=grebla-app
# Instancia local (karajan-sonarqube). El token NO va aquí: se pasa en el scan
# (npx @sonar/scan -Dsonar.token=***) o vía la variable de entorno SONAR_TOKEN.
sonar.host.url=http://localhost:9000

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.js
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,functions/node_modules/**

# Cobertura de Vitest (pnpm test:coverage → coverage/lcov.info)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Los módulos de DATOS curados (islas, rutas por rol) son estructuralmente
# repetitivos por naturaleza: fuera del detector de duplicación (no de análisis).
sonar.cpd.exclusions=src/tools/career/data/**
